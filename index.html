<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador Textos Stories PRO</title>
    <!-- Google Fonts for premium UI and text rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Lilita+One&family=Montserrat:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Oswald:wght@400;700&family=Righteous&family=Rubik+Dirt&family=Rubik+Glitch&family=Rubik:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #09090b;
            --bg-panel: #18181b;
            --bg-input: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --border-color: #27272a;
            --success: #10b981;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.6), 0 8px 10px -6px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        /* Fuerza un contenedor en formato vertical tipo celular en cualquier pantalla */
        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-y: auto;
        }

        .app-container {
            width: 100vw;
            min-height: 100vh;
            max-width: 480px; /* Ancho máximo de celular */
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            position: relative;
            /* Bordes simulados de celular en computadoras */
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        /* Área de Previsualización (Sticky arriba en formato vertical) */
        .preview-area {
            position: sticky;
            top: 0;
            height: 35vh;
            min-height: 220px;
            max-height: 280px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 100;
            flex-shrink: 0;
        }

        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            display: block; 
            margin: 0 auto;
            /* Patrón cuadriculado transparente premium */
            background-image: 
                linear-gradient(45deg, #1d1d20 25%, transparent 25%), 
                linear-gradient(-45deg, #1d1d20 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1d1d20 75%), 
                linear-gradient(-45deg, transparent 75%, #1d1d20 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: #121214;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
        }

        /* Panel de Controles (Abajo del canvas, fluye de forma natural) */
        .controles-panel { 
            flex: 1;
            background: var(--bg-panel); 
            display: flex;
            flex-direction: column;
            overflow: visible;
            position: relative;
            z-index: 5;
        }

        /* Navegación por pestañas */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab-btn.active {
            color: var(--text-main);
            background: var(--bg-panel);
            border-bottom: 2px solid #3b82f6;
        }

        /* Contenido de pestañas (Flujo vertical) */
        .tab-content {
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .tab-content.active {
            display: flex;
        }

        /* Grupos de Formulario */
        .group { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            width: 100%; 
        }
        
        .row-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            width: 100%; 
        }

        label { 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--text-muted); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Componentes de entrada */
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: inherit;
            width: 100%;
            font-size: 15px; 
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
        }

        textarea { 
            height: 75px; 
            resize: none; 
        }

        /* Sliders */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        .slider-value {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-main);
            width: 38px;
            text-align: right;
        }

        /* Selectores de color premium */
        .color-picker-wrapper {
            position: relative;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--border-color);
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .color-picker-wrapper input[type="color"] {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 60px;
            height: 60px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }

        /* Botones de Alineación */
        .align-buttons {
            display: flex;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 3px;
            border: 1px solid var(--border-color);
        }

        .align-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px;
            color: var(--text-muted);
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .align-btn.active {
            background: var(--bg-panel);
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Switches */
        .switch { 
            position: relative; 
            display: inline-block; 
            width: 44px; 
            height: 22px; 
            flex-shrink: 0; 
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: var(--bg-input); 
            transition: .3s; 
            border-radius: 22px; 
            border: 1px solid var(--border-color);
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 14px; 
            width: 14px; 
            left: 3px; 
            bottom: 3px; 
            background-color: var(--text-muted); 
            transition: .3s; 
            border-radius: 50%; 
        }
        input:checked + .slider { 
            background: var(--accent-gradient); 
            border-color: transparent;
        }
        input:checked + .slider:before { 
            transform: translateX(22px); 
            background-color: white;
        }

        /* Grilla de Fuentes / Previsualizador */
        .fonts-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .fonts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 2px;
        }
        
        .fonts-grid::-webkit-scrollbar {
            width: 5px;
        }
        .fonts-grid::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .font-card {
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 4px;
            min-height: 64px;
        }

        .font-card:hover {
            border-color: #444;
            background: #2a2a2e;
        }

        .font-card.active {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .font-card-name {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .font-card-preview {
            font-size: 18px;
            color: var(--text-main);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            line-height: 1.2;
        }
        
        .font-card-category {
            font-size: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Variantes en forma de Pills */
        .variant-pills-container {
            background: rgba(0,0,0,0.15);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .variant-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .variant-pill {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .variant-pill:hover {
            border-color: #555;
            color: var(--text-main);
        }
        
        .variant-pill.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .file-upload-btn {
            background: var(--bg-input);
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .file-upload-btn:hover {
            border-color: var(--accent);
            color: var(--text-main);
        }

        /* Botones de acción principales (Fijos al fondo de controles en móvil) */
        .actions-panel {
            padding: 12px 15px;
            border-top: 1px solid var(--border-color);
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.95;
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: #2f2f33;
        }

        /* Toast de notificaciones */
        .toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f2937;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }
        
        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* Estilos condicionales */
        .hidden {
            display: none !important;
        }

        /* ==========================================================================
           DISEÑO ADAPTATIVO (MEDIA QUERIES)
           ========================================================================== */

        /* Pantalla muy corta (Teclado móvil abierto, modo landscape corto) */
        @media (max-height: 550px) {
            body {
                height: auto;
                overflow: auto;
            }
            .app-container {
                height: auto;
                width: 100%;
            }
            .preview-area {
                position: static !important;
                height: 220px !important;
                max-height: 220px !important;
                min-height: auto !important;
                border-bottom: 1px solid var(--border-color);
            }
            .tabs {
                position: static !important;
            }
            .controles-panel {
                flex: 0 0 auto;
                overflow: visible;
                height: auto;
            }
            .tab-content {
                flex: 0 0 auto;
                overflow: visible;
                height: auto;
            }
        }

        /* Selector de Fondo de Previsualización */
        .preview-bg-group {
            margin-bottom: 12px;
        }
        .preview-bg-selector {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            align-items: center;
        }
        .preview-bg-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
            position: relative;
        }
        .preview-bg-btn:hover {
            transform: scale(1.08);
        }
        .preview-bg-btn.active {
            border-color: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 0 10px rgba(255,255,255,0.8), inset 0 0 3px rgba(0,0,0,0.5);
        }
        .preview-bg-btn.azul { background-color: #0044ff; }
        .preview-bg-btn.rojo { background-color: #ef4444; }
        .preview-bg-btn.verde { background-color: #22c55e; }
        .preview-bg-btn.amarillo { background-color: #eab308; }
        .preview-bg-btn.transparente {
            background-image: 
                linear-gradient(45deg, #bbb 25%, transparent 25%), 
                linear-gradient(-45deg, #bbb 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #bbb 75%), 
                linear-gradient(-45deg, transparent 75%, #bbb 75%);
            background-size: 8px 8px;
            background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
            background-color: #eee;
        }

        /* Clases de fondo de Canvas */
        canvas.bg-azul {
            background-color: #0044ff !important;
            background-image: none !important;
        }
        canvas.bg-rojo {
            background-color: #ef4444 !important;
            background-image: none !important;
        }
        canvas.bg-verde {
            background-color: #22c55e !important;
            background-image: none !important;
        }
        canvas.bg-amarillo {
            background-color: #eab308 !important;
            background-image: none !important;
        }
        canvas.bg-transparente {
            /* Patrón heredado original */
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Previsualizador del Lienzo (Siempre Arriba en móvil/celular) -->
        <div class="preview-area">
            <canvas id="miCanvas" class="bg-azul"></canvas>
        </div>

        <!-- Panel de Controles (Abajo en formato vertical) -->
        <div class="controles-panel">
            
            <!-- Pestañas -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tab-texto')">📝 Texto</button>
                <button class="tab-btn" onclick="switchTab('tab-estilo')">🎨 Estilo</button>
                <button class="tab-btn" onclick="switchTab('tab-fuentes')">🔤 Fuentes</button>
            </div>

            <!-- Contenido Pestaña 1: Texto -->
            <div id="tab-texto" class="tab-content active">
                <div class="group">
                    <label>Escribe tu Texto</label>
                    <textarea id="textoInput" placeholder="Ej: Hola Instagram&#10;Este es un collage"></textarea>
                </div>

                <div class="row-group">
                    <div class="group" style="flex: 1;">
                        <label>Tamaño de Letra</label>
                        <div class="slider-container">
                            <input type="range" id="fontSizeInput" min="20" max="250" value="80">
                            <span class="slider-value" id="fontSizeVal">80px</span>
                        </div>
                    </div>
                    <div class="group" style="width: auto;">
                        <label>Color Texto</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="colorInput" value="#ffffff">
                        </div>
                    </div>
                </div>

                <div class="group">
                    <label>Alineación</label>
                    <div class="align-buttons">
                        <button class="align-btn" onclick="setAlign('left')" id="align-left">Izquierda</button>
                        <button class="align-btn active" onclick="setAlign('center')" id="align-center">Centro</button>
                        <button class="align-btn" onclick="setAlign('right')" id="align-right">Derecha</button>
                    </div>
                </div>
            </div>

            <div id="tab-estilo" class="tab-content">
                <div class="group preview-bg-group">
                    <label>Fondo de Previsualización (Solo Visual)</label>
                    <div class="preview-bg-selector">
                        <button type="button" class="preview-bg-btn azul active" onclick="setCanvasBackground('azul')" title="Azul"></button>
                        <button type="button" class="preview-bg-btn rojo" onclick="setCanvasBackground('rojo')" title="Rojo"></button>
                        <button type="button" class="preview-bg-btn verde" onclick="setCanvasBackground('verde')" title="Verde"></button>
                        <button type="button" class="preview-bg-btn amarillo" onclick="setCanvasBackground('amarillo')" title="Amarillo"></button>
                        <button type="button" class="preview-bg-btn transparente" onclick="setCanvasBackground('transparente')" title="Cuadrícula Transparente"></button>
                    </div>
                </div>
                <div class="group">
                    <label>Tipo de Lienzo (Formato)</label>
                    <select id="layoutModeInput">
                        <option value="auto" selected>Ajuste Automático (Collage PNG)</option>
                        <option value="story">Historia Vertical (9:16)</option>
                    </select>
                </div>

                <!-- Opciones de Historia Vertical -->
                <div id="opcionesHistoria" class="hidden">
                    <div class="row-group">
                        <div class="group" style="flex: 1;">
                            <label>Posición Vertical</label>
                            <select id="posicionInput">
                                <option value="top">Superior (Zona Segura)</option>
                                <option value="center" selected>Centro</option>
                                <option value="bottom">Inferior (Zona Segura)</option>
                            </select>
                        </div>
                        <div class="group" style="align-items: center; width: auto; flex-direction: row; gap: 8px; margin-top: 18px;">
                            <label class="switch">
                                <input type="checkbox" id="guiasInput" checked>
                                <span class="slider"></span>
                            </label>
                            <span style="font-size: 13px; font-weight: 600;">Ver Guías</span>
                        </div>
                    </div>
                </div>

                <!-- Opciones de Ajuste Automático -->
                <div id="opcionesAuto" class="group">
                    <div class="row-group">
                        <div class="group" style="flex: 1;">
                            <label>Margen Horiz. (Padding)</label>
                            <div class="slider-container">
                                <input type="range" id="paddingXInput" min="10" max="150" value="40">
                                <span class="slider-value" id="paddingXVal">40px</span>
                            </div>
                        </div>
                        <div class="group" style="flex: 1;">
                            <label>Margen Vert. (Padding)</label>
                            <div class="slider-container">
                                <input type="range" id="paddingYInput" min="10" max="150" value="40">
                                <span class="slider-value" id="paddingYVal">40px</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="group">
                        <label>Ancho Máximo del Texto</label>
                        <div class="slider-container">
                            <input type="range" id="maxWidthInput" min="200" max="1200" value="800">
                            <span class="slider-value" id="maxWidthVal">800px</span>
                        </div>
                    </div>
                </div>

                <div class="group">
                    <label>Interlineado (Separación)</label>
                    <div class="slider-container">
                        <input type="range" id="lineSpacingInput" min="0.8" max="2.5" step="0.1" value="1.2">
                        <span class="slider-value" id="lineSpacingVal">1.2x</span>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 5px 0;">

                <!-- Contorno -->
                <div class="row-group" style="justify-content: space-between;">
                    <span style="font-size: 14px; font-weight: 600;">Activar Contorno de Texto</span>
                    <label class="switch">
                        <input type="checkbox" id="contornoInput" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="opcionesContorno" class="group">
                    <div class="row-group">
                        <div class="group" style="flex: 1;">
                            <label>Grosor del Contorno</label>
                            <div class="slider-container">

        function vincularInputs() {

        // --- MANEJO DE FUENTES ---

        async function cargarFuentesServidor() {
            try {
                const response = await fetch('/api/fonts');
                const data = await response.json();
                
                let fuentes = data.fonts || [];
                
                // Filtrar fuentes del servidor que ya son del paquete predefinido "Authority"
                const nombresPredefinidos = FUENTES_PREDEFINIDAS.map(f => f.filename.toLowerCase());
                const nuevasFuentes = fuentes.filter(f => !nombresPredefinidos.includes(f.filename.toLowerCase()));
                
                // Registrar y agregar cada nueva fuente del servidor como familia única
                for (let f of nuevasFuentes) {
                    const fontFamilyName = `Server_${f.name.replace(/\s+/g, '')}`;
                    await registrarFuente(fontFamilyName, `/fonts/${f.filename}`);
                    
                    FAMILIAS_FUENTES.push({
                        name: f.name,
                        category: "Servidor local",
                        defaultVariant: "Regular",
                        variants: [
                            { name: "Regular", fontFamily: fontFamilyName, fontWeight: "normal", fontStyle: "normal" }
                        ]
                    });
                }
            } catch (err) {
                console.warn('Backend offline o corriendo en GitHub Pages. Catálogo de servidor omitido.');
                // Ocultar botón "Guardar en Servidor" en GitHub Pages
                document.getElementById('btnSaveServer').classList.add('hidden');
            }
        }

        async function registrarFuente(name, url) {
            if (loadedFonts.has(name)) return;
            try {
                const fontFace = new FontFace(name, `url(${url})`);
                const loaded = await fontFace.load();
                document.fonts.add(loaded);
                loadedFonts.set(name, true);
                console.log(`Fuente cargada: ${name}`);
            } catch (e) {
                console.error(`Error cargando fuente ${name} desde ${url}:`, e);
            }
        }

        // Renderiza las tarjetas de familias de fuentes
        function renderizarFamiliasGrid() {
            const grid = document.getElementById('familiesGrid');
            grid.innerHTML = '';
            
            FAMILIAS_FUENTES.forEach((family, idx) => {
                const card = document.createElement('div');
                card.className = `font-card ${editorState.activeFamilyIndex === idx ? 'active' : ''}`;
                card.onclick = () => seleccionarFamilia(idx);
                
                // Buscar variante predeterminada para el preview
                const defVar = family.variants.find(v => v.name === family.defaultVariant) || family.variants[0];
                const previewStyle = `font-family: '${defVar.fontFamily}'; font-weight: ${defVar.fontWeight || 'normal'}; font-style: ${defVar.fontStyle || 'normal'};`;
                
                card.innerHTML = `
                    <div>
                        <div class="font-card-name">${family.name}</div>
                        <div class="font-card-category">${family.category}</div>
                    </div>
                    <span class="font-card-preview" style="${previewStyle}">Abc</span>
                `;
                grid.appendChild(card);
            });
        }

        // Selecciona una familia e inicializa/renderiza sus variantes
        function seleccionarFamilia(familyIndex) {
            editorState.activeFamilyIndex = familyIndex;
            
            // Actualizar tarjetas activas
            const cards = document.querySelectorAll('#familiesGrid .font-card');
            cards.forEach((card, idx) => {
                if (idx === familyIndex) card.classList.add('active');
                else card.classList.remove('active');
            });
            
            const family = FAMILIAS_FUENTES[familyIndex];
            
            // Buscar índice de la variante predeterminada
            let defaultVarIdx = family.variants.findIndex(v => v.name === family.defaultVariant);
            if (defaultVarIdx === -1) defaultVarIdx = 0;
            
            renderizarVariantesGrid(family.variants, defaultVarIdx);
            seleccionarVariante(defaultVarIdx);
        }

        // Renderiza los pills de variantes para la familia seleccionada
        function renderizarVariantesGrid(variants, selectedIdx) {
            const grid = document.getElementById('variantsGrid');
            const container = document.getElementById('variantsContainer');
            
            grid.innerHTML = '';
            
            // Si la familia tiene una sola variante, ocultamos o simplificamos el selector
            if (variants.length <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');

            variants.forEach((v, idx) => {
                const pill = document.createElement('button');
                pill.className = `variant-pill ${idx === selectedIdx ? 'active' : ''}`;
                pill.innerText = v.name;
                pill.onclick = () => seleccionarVariante(idx);
                grid.appendChild(pill);
            });
        }

        // Aplica la variante elegida al estado y actualiza el canvas
        async function seleccionarVariante(variantIndex) {
            editorState.activeVariantIndex = variantIndex;
            
            const family = FAMILIAS_FUENTES[editorState.activeFamilyIndex];
            const variant = family.variants[variantIndex];
            
            // Si la variante tiene url y no se ha registrado/cargado, registrarla ahora
            if (variant.url && !loadedFonts.has(variant.fontFamily)) {
                showToast("Cargando tipografía...", "info");
                await registrarFuente(variant.fontFamily, variant.url);
            }
            
            // Actualizar pills activos
            const pills = document.querySelectorAll('#variantsGrid .variant-pill');
            pills.forEach((pill, idx) => {
                if (idx === variantIndex) pill.classList.add('active');
                else pill.classList.remove('active');
            });
            
            // Aplicar propiedades de renderizado
            editorState.fontFamily = variant.fontFamily;
            editorState.fontWeight = variant.fontWeight || 'normal';
            editorState.fontStyle = variant.fontStyle || 'normal';
            
            actualizarCanvas();
        }

        // Cambia el fondo visual del lienzo (sólo CSS, no afecta la exportación)
        function setCanvasBackground(colorName) {
            const canvas = document.getElementById('miCanvas');
            canvas.classList.remove('bg-azul', 'bg-rojo', 'bg-verde', 'bg-amarillo', 'bg-transparente');
            canvas.classList.add(`bg-${colorName}`);
            
            document.querySelectorAll('.preview-bg-btn').forEach(btn => {
                if (btn.classList.contains(colorName)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Permite subir una fuente manual y la agrega como nueva familia
        function cargarFuenteLocal(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const fontData = event.target.result;
                    const customFontFamily = 'Subida_' + Date.now();
                    const newFont = new FontFace(customFontFamily, fontData);
                    
                    newFont.load().then(function(loadedFont) {
                        document.fonts.add(loadedFont);
                        loadedFonts.set(customFontFamily, true);
                        
                        // Añadir al catálogo al inicio
                        const cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, ' ');
                        FAMILIAS_FUENTES.unshift({
                            name: cleanName,
                            category: "Subida manual",
                            defaultVariant: "Regular",
                            variants: [
                                { name: "Regular", fontFamily: customFontFamily, fontWeight: "normal", fontStyle: "normal" }
                            ]
                        });
                        
                        // Refrescar e ir a la nueva familia
                        renderizarFamiliasGrid();
                        seleccionarFamilia(0);
                        showToast("Fuente cargada y seleccionada!");
                    }).catch(err => {
                        showToast("Archivo de fuente corrupto o inválido", "error");
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        // --- RENDERIZADO DEL CANVAS ---

        // Divide el texto en líneas respetando saltos de línea y envolviendo si supera el maxWidth
        function fragmentarTexto(texto, maxWidth) {
            const parrafos = texto.split('\n');
            const lineasFinales = [];
            
            parrafos.forEach(parrafo => {
                if (parrafo.trim() === '') {
                    lineasFinales.push('');
                    return;
                }
                const palabras = parrafo.split(' ');
                let lineaActual = palabras[0];
                
                for (let i = 1; i < palabras.length; i++) {
                    const palabra = palabras[i];
                    const width = ctx.measureText(lineaActual + " " + palabra).width;
                    if (width < maxWidth) {
                        lineaActual += " " + palabra;
                    } else {
                        lineasFinales.push(lineaActual);
                        lineaActual = palabra;
                    }
                }
                lineasFinales.push(lineaActual);
            });
            
            return lineasFinales;
        }

        function actualizarCanvas() {
            // Configurar contexto de medición
            ctx.font = `${editorState.fontStyle} ${editorState.fontWeight} ${editorState.fontSize}px "${editorState.fontFamily}"`;
            
            const texto = editorState.text;
            if (!texto) {
                // Canvas vacío si no hay texto
                canvas.width = 300;
                canvas.height = 100;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            const strokeOffset = editorState.usarContorno ? editorState.anchoContorno : 0;
            const shadowOffsetMax = editorState.usarSombra ? (Math.abs(editorState.offsetYSombra) + (editorState.anchoSombra / 1.5)) : 0;
            const extraOffset = strokeOffset + shadowOffsetMax;
            
            const lineHeight = editorState.fontSize * editorState.lineSpacing;
            
            let lines = [];
            
            if (editorState.layoutMode === 'auto') {
                // --- MODO AUTO-AJUSTE ---
                lines = fragmentarTexto(texto, editorState.maxWidth);
                
                // Medir el ancho del párrafo (la línea más ancha)
                let maxLineWidth = 0;
                lines.forEach(line => {
                    const w = ctx.measureText(line).width;
                    if (w > maxLineWidth) maxLineWidth = w;
                });
                
                // Dimensionar canvas con el extraOffset para evitar recortes
                canvas.width = Math.ceil(maxLineWidth + (editorState.paddingX * 2) + (extraOffset * 2));
                canvas.height = Math.ceil((lines.length * lineHeight) - (lineHeight - editorState.fontSize) + (editorState.paddingY * 2) + (extraOffset * 2));
                
            } else {
                // --- MODO HISTORIA 9:16 ---
                canvas.width = 1080;
                canvas.height = 1920;
                // Envoltorio de texto ajustado al ancho de historia - márgenes
                lines = fragmentarTexto(texto, 1080 - 120);
            }

            // Limpiar lienzo
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Guías en modo Historia 9:16
            if (editorState.layoutMode === 'story' && editorState.mostrarGuias) {
                // Zonas no seguras en rojo translúcido
                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                ctx.fillRect(0, 0, 1080, 250); // Superior
                ctx.fillRect(0, 1920 - 340, 1080, 340); // Inferior
                
                ctx.fillStyle = 'rgba(239, 68, 68, 0.06)';
                ctx.fillRect(0, 250, 50, 1920 - 250 - 340); // Lateral izq
                ctx.fillRect(1080 - 50, 250, 50, 1920 - 250 - 340); // Lateral der
            }

            // Configurar estilos de dibujo del texto
            ctx.font = `${editorState.fontStyle} ${editorState.fontWeight} ${editorState.fontSize}px "${editorState.fontFamily}"`;
            ctx.textBaseline = 'top';
            ctx.fillStyle = editorState.textColor;
            
            if (editorState.usarContorno) {
                ctx.strokeStyle = editorState.colorContorno;
                ctx.lineWidth = editorState.anchoContorno * 2;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
            }

            // Calcular origen Y de dibujado
            let startY;
            const totalTextHeight = (lines.length * lineHeight) - (lineHeight - editorState.fontSize);
            
            if (editorState.layoutMode === 'auto') {
                startY = editorState.paddingY + extraOffset;
            } else {
                // En modo historia calculamos según la posición elegida
                if (editorState.posicionStory === 'top') {
                    startY = 250 + 40; // Justo debajo de zona no segura superior
                } else if (editorState.posicionStory === 'center') {
                    startY = (1920 / 2) - (totalTextHeight / 2);
                } else {
                    startY = (1920 - 340) - totalTextHeight - 40; // Justo arriba de la zona no segura inferior
                }
            }

            // Dibujar cada línea
            lines.forEach((line, index) => {
                let x;
                const currentY = startY + (index * lineHeight);
                
                // Determinar X e inclinación según la alineación
                if (editorState.align === 'center') {
                    x = canvas.width / 2;
                    ctx.textAlign = 'center';
                } else if (editorState.align === 'left') {
                    x = editorState.layoutMode === 'auto' ? (editorState.paddingX + extraOffset) : 60;
                    ctx.textAlign = 'left';
                } else { // right
                    x = editorState.layoutMode === 'auto' ? (canvas.width - editorState.paddingX - extraOffset) : (1080 - 60);
                    ctx.textAlign = 'right';
                }

                // Renderizar paso 1: Con sombra (si está activada)
                if (editorState.usarSombra) {
                    ctx.shadowColor = editorState.colorSombra;
                    ctx.shadowBlur = editorState.anchoSombra;
                    ctx.shadowOffsetX = editorState.offsetXSombra;
                    ctx.shadowOffsetY = editorState.offsetYSombra;
                } else {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                if (editorState.usarContorno && line.trim() !== '') {
                    ctx.strokeText(line, x, currentY);
                } else if (line.trim() !== '') {
                    ctx.fillText(line, x, currentY);
                }
                
                // Renderizar paso 2: Dibujar el relleno nítido por encima (y quitar la sombra)
                if (editorState.usarSombra) {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }

                if (editorState.usarContorno && line.trim() !== '') {
                    ctx.fillText(line, x, currentY);
                }
            });
        }

        // --- ENVIAR AL SERVIDOR / DESCARGAR ---

        function descargarPNG() {
            // Desactivar temporalmente guías de historia para exportar limpia
            const guiasEstabanActivas = editorState.mostrarGuias;
            if (guiasEstabanActivas) {
                editorState.mostrarGuias = false;
                actualizarCanvas();
            }
            
            const dataUrl = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = 'collage-texto-' + Date.now() + '.png';
            link.href = dataUrl;
            link.click();

            // Restaurar guías
            if (guiasEstabanActivas) {
                editorState.mostrarGuias = true;
                actualizarCanvas();
            }
            
            showToast("Imagen descargada con éxito");
        }

        async function guardarEnServidor() {
            // Desactivar temporalmente guías de historia para exportar limpia
            const guiasEstabanActivas = editorState.mostrarGuias;
            if (guiasEstabanActivas) {
                editorState.mostrarGuias = false;
                actualizarCanvas();
            }

            const dataUrl = canvas.toDataURL('image/png');

            // Restaurar guías inmediatamente
            if (guiasEstabanActivas) {
                editorState.mostrarGuias = true;
                actualizarCanvas();
            }

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataUrl })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`¡Guardado en renders/${result.filename}!`);
                } else {
                    showToast(`Error: ${result.error}`, "error");
                }
            } catch (err) {
                console.error(err);
                showToast("No se pudo conectar con el servidor", "error");
            }
        }

        // --- UTILERÍAS DE INTERFAZ ---

        function showToast(message, type = "success") {
            const toast = document.getElementById('notificationToast');
            const toastText = document.getElementById('toastText');
            
            toast.className = `toast show ${type}`;
            toastText.innerText = message;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
